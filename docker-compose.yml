version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: userflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  rabbitmq:
    image: rabbitmq:3-management
    container_name: userflow-rabbit
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  pgdata: